syntax = "proto3";

option csharp_namespace = "TravelAgency.Catalog.Infrastructure.Grpc";

package catalog;

service CatalogService {
  rpc GetTourSnapshot (GetTourSnapshotRequest) returns (TourSnapshotResponse);
}

message GetTourSnapshotRequest {
  string tour_id = 1;
}

message TourSnapshotResponse {
  string tour_id = 1;
  string title = 2;
  string country = 3;
  int32 duration_days = 4;
  double price_per_person = 5;
  string currency = 6;
  bool found = 7;
}
